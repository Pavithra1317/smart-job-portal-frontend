<div class="auth-wrapper">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create Your Account</mat-card-title>
      <mat-card-subtitle>Join Smart Job Portal as a candidate or recruiter</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName">
          <mat-error *ngIf="form.get('fullName')?.hasError('required')">Full name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone (optional)</mat-label>
          <input matInput formControlName="phone">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <label class="role-label">I am a:</label>
        <mat-radio-group formControlName="role" class="role-group">
          <mat-radio-button value="CANDIDATE">Candidate (Job Seeker)</mat-radio-button>
          <mat-radio-button value="RECRUITER">Recruiter (Employer)</mat-radio-button>
        </mat-radio-group>

        <button mat-raised-button color="primary" class="full-width submit-btn"
                type="submit" [disabled]="form.invalid || loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Create Account</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="footer-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </mat-card-footer>
  </mat-card>
</div>
