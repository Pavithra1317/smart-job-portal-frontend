<div class="page-container">
  <h1>{{ editingId ? 'Edit Job Posting' : 'Post a New Job' }}</h1>

  <mat-card>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Job Title</mat-label>
        <input matInput formControlName="title">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput rows="5" formControlName="description"></textarea>
      </mat-form-field>

      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Company</mat-label>
          <input matInput formControlName="company">
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Location</mat-label>
          <input matInput formControlName="location">
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Required Skills (comma-separated)</mat-label>
        <input matInput formControlName="requiredSkills" placeholder="Java, Spring Boot, MySQL">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Job Type</mat-label>
        <mat-select formControlName="jobType">
          <mat-option *ngFor="let type of jobTypes" [value]="type">{{ type.replace('_',' ') }}</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Min Salary (₹)</mat-label>
          <input matInput type="number" formControlName="minSalary">
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Max Salary (₹)</mat-label>
          <input matInput type="number" formControlName="maxSalary">
        </mat-form-field>
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
        {{ editingId ? 'Update Job' : 'Post Job' }}
      </button>
    </form>
  </mat-card>
</div>
