<div class="page-container">
  <div class="header-row">
    <h1>My Job Postings</h1>
    <a mat-raised-button color="primary" routerLink="/recruiter/post-job">
      <mat-icon>add</mat-icon> Post New Job
    </a>
  </div>

  <div *ngIf="loading" class="loading-text">Loading...</div>

  <table mat-table [dataSource]="jobs" class="full-width" *ngIf="!loading">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let job">{{ job.title }}</td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let job">{{ job.location }}</td>
    </ng-container>

    <ng-container matColumnDef="jobType">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let job">{{ job.jobType.replace('_',' ') }}</td>
    </ng-container>

    <ng-container matColumnDef="applicantCount">
      <th mat-header-cell *matHeaderCellDef>Applicants</th>
      <td mat-cell *matCellDef="let job">
        <a [routerLink]="['/recruiter/jobs', job.id, 'applicants']">{{ job.applicantCount }}</a>
      </td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Active</th>
      <td mat-cell *matCellDef="let job">
        <mat-slide-toggle [checked]="job.active" (change)="toggleActive(job)"></mat-slide-toggle>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let job">
        <a mat-icon-button color="primary" [routerLink]="['/recruiter/post-job', job.id]">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="deleteJob(job)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="!loading && jobs.length === 0" class="no-results">
    You haven't posted any jobs yet.
  </p>
</div>
