<div class="page-container">
  <h1>Manage Users</h1>

  <mat-select [(value)]="selectedRole" (selectionChange)="loadUsers()" placeholder="Filter by role" class="role-filter">
    <mat-option value="">All Roles</mat-option>
    <mat-option value="CANDIDATE">Candidate</mat-option>
    <mat-option value="RECRUITER">Recruiter</mat-option>
    <mat-option value="ADMIN">Admin</mat-option>
  </mat-select>

  <div *ngIf="loading" class="loading-text">Loading...</div>

  <table mat-table [dataSource]="users" class="full-width" *ngIf="!loading">
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let u">{{ u.fullName }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let u">{{ u.role }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let u">{{ u.accountLocked ? 'Locked' : 'Active' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let u">
        <button mat-icon-button (click)="toggleLock(u)" [title]="u.accountLocked ? 'Unlock' : 'Lock'">
          <mat-icon>{{ u.accountLocked ? 'lock_open' : 'lock' }}</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteUser(u)" title="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
